<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- Browser window -->
  <rect x="10" y="14" width="44" height="34" rx="5" stroke="white" stroke-width="2.5" fill="none"/>

  <!-- Title bar divider -->
  <line x1="10" y1="24" x2="54" y2="24" stroke="white" stroke-width="2.5"/>

  <!-- Three dots -->
  <circle cx="18" cy="19" r="2" fill="white"/>
  <circle cx="25" cy="19" r="2" fill="white"/>
  <circle cx="32" cy="19" r="2" fill="white"/>
</svg>
